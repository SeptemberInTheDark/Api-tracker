services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: api_tracker
      POSTGRES_PASSWORD: api_tracker
      POSTGRES_DB: api_tracker_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_tracker -d api_tracker_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: bash -lc "bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    environment:
      DATABASE_URL: postgres://api_tracker:api_tracker@db:5432/api_tracker_development
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  bundle_cache:
